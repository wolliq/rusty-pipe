name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  pre-commit:
    name: Run Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run pre-commit
        run: |
          uvx pre-commit install
          uvx pre-commit run --all-files

  test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Tests
        env:
          PYTHONPATH: .
        run: uv run pytest

  deploy-test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: TEST
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Deploying feature to TEST environment..."
          # Add actual deployment commands here

  deploy-stg:
    name: Deploy to STG
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: STG
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Deploying release to STG environment..."
          # Add actual deployment commands here

  deploy-prd:
    name: Deploy to PRD
    runs-on: ubuntu-latest
    needs: deploy-stg
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: 
      name: PRD
      # A manual approval rule should be added in the GitHub Environment settings for PRD.
